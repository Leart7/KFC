{% extends "layout/adminLayout.html" %}

{% block title %}Library | Dashboard{% endblock %}

{% block content %}
<div class="content-body">
  <div class="container-fluid">
    {% if message|length > 0 %}
                  <div class='row page-titles d-flex justify-content-center text-center align-items-center' style='background-color:rgb(168,227,177);'>
                 {{ message }}
                  </div>
        {% endif %}
      <div class="row">
 
            {% for p in products %}
               
              <div class="col-xl-3 col-lg-6 col-md-4 col-sm-6">
              <a href='/phpushtrime/KFC_advanced/public/product-edit?pid={{ p.id }}'>
              <div class="card">
              <div class="card-body">
              <div class="new-arrival-product">
              <div class="new-arrivals-img-contnent">
              <img class='img-fluid' src='images/{{ p.photo }}' alt=''>
              </div>
              <div class="new-arrival-content text-center mt-3">
              <h4>{{ p.name }}</h4>
             
              <span class='price'>{{ p.price }}€</span>
              </div>
              </div>
              </div>
              </div>
              </a>
              </div>
              {% endfor %}
      </div>
  </div>
</div>
{% endblock %}
